<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    .header {
      background: #4f46e5;
      color: #fff;
      padding: 28px 24px 20px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header .subtitle {
      font-size: 13px;
      opacity: 0.75;
      margin-top: 4px;
    }

    .input-area {
      padding: 20px 24px;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      color: #1e293b;
    }

    .input-area input:focus {
      border-color: #4f46e5;
    }

    .input-area input::placeholder {
      color: #94a3b8;
    }

    .input-area button {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 22px;
      cursor: pointer;
      transition: background 0.15s;
      line-height: 1;
    }

    .input-area button:hover {
      background: #4338ca;
    }

    .list-header {
      padding: 14px 24px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .list-header .count {
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .clear-btn {
      font-size: 12px;
      color: #ef4444;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.1s;
    }

    .clear-btn:hover {
      background: #fef2f2;
    }

    .list {
      list-style: none;
      padding: 0 16px 20px;
      min-height: 60px;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 10px;
      transition: background 0.1s;
      cursor: pointer;
    }

    .list-item:hover {
      background: #f8fafc;
    }

    .list-item .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #cbd5e1;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      background: #fff;
    }

    .list-item.checked .checkbox {
      background: #4f46e5;
      border-color: #4f46e5;
    }

    .list-item.checked .checkbox::after {
      content: "";
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .list-item .text {
      flex: 1;
      font-size: 15px;
      color: #1e293b;
      transition: color 0.15s;
      word-break: break-all;
    }

    .list-item.checked .text {
      color: #94a3b8;
      text-decoration: line-through;
    }

    .list-item .delete-btn {
      opacity: 0;
      background: none;
      border: none;
      color: #cbd5e1;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: opacity 0.15s, color 0.15s, background 0.15s;
    }

    .list-item:hover .delete-btn {
      opacity: 1;
    }

    .list-item .delete-btn:hover {
      color: #ef4444;
      background: #fef2f2;
    }

    .empty {
      text-align: center;
      color: #cbd5e1;
      font-size: 14px;
      padding: 32px 0 12px;
    }

    .empty .icon {
      font-size: 40px;
      display: block;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛒 쇼핑 리스트</h1>
      <p class="subtitle" id="subtitle">항목을 추가해 보세요</p>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="item-input"
        placeholder="예: 사과, 우유, 계란..."
        maxlength="60"
      />
      <button id="add-btn" title="추가">+</button>
    </div>

    <div class="list-header">
      <span class="count" id="count-label">항목 0개</span>
      <button class="clear-btn" id="clear-checked-btn" style="display:none">완료 항목 삭제</button>
    </div>

    <ul class="list" id="list">
      <li class="empty">
        <span class="icon">🛍️</span>
        아직 항목이 없어요
      </li>
    </ul>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://qnzgokfhsghlewvoglso.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFuemdva2Zoc2dobGV3dm9nbHNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MDA0ODMsImV4cCI6MjA5Njk3NjQ4M30.MWPprXGqydjSgYrydhSYQi85ltc6AtSDr2TgIvOcffc";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];

    const listEl = document.getElementById("list");
    const inputEl = document.getElementById("item-input");
    const addBtn = document.getElementById("add-btn");
    const countLabel = document.getElementById("count-label");
    const subtitleEl = document.getElementById("subtitle");
    const clearCheckedBtn = document.getElementById("clear-checked-btn");

    async function loadItems() {
      const { data, error } = await supabaseClient
        .from("shopping_items")
        .select("*")
        .order("created_at", { ascending: false });
      if (!error) {
        items = data;
        render();
      }
    }

    function render() {
      listEl.innerHTML = "";

      if (items.length === 0) {
        listEl.innerHTML = `
          <li class="empty">
            <span class="icon">🛍️</span>
            아직 항목이 없어요
          </li>`;
      } else {
        items.forEach((item) => {
          const li = document.createElement("li");
          li.className = "list-item" + (item.checked ? " checked" : "");

          li.innerHTML = `
            <div class="checkbox"></div>
            <span class="text">${escapeHtml(item.text)}</span>
            <button class="delete-btn" title="삭제">×</button>
          `;

          li.addEventListener("click", async (e) => {
            if (e.target.closest(".delete-btn")) return;
            await supabaseClient
              .from("shopping_items")
              .update({ checked: !item.checked })
              .eq("id", item.id);
            await loadItems();
          });

          li.querySelector(".delete-btn").addEventListener("click", async (e) => {
            e.stopPropagation();
            await supabaseClient
              .from("shopping_items")
              .delete()
              .eq("id", item.id);
            await loadItems();
          });

          listEl.appendChild(li);
        });
      }

      const total = items.length;
      const checked = items.filter((i) => i.checked).length;

      countLabel.textContent = `항목 ${total}개`;
      subtitleEl.textContent =
        total === 0
          ? "항목을 추가해 보세요"
          : checked === total && total > 0
          ? "모두 완료했어요! 🎉"
          : `${total}개 중 ${checked}개 완료`;

      clearCheckedBtn.style.display = checked > 0 ? "inline-block" : "none";
    }

    async function addItem() {
      const text = inputEl.value.trim();
      if (!text) return;
      await supabaseClient.from("shopping_items").insert({ text, checked: false });
      inputEl.value = "";
      inputEl.focus();
      await loadItems();
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    addBtn.addEventListener("click", addItem);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addItem();
    });

    clearCheckedBtn.addEventListener("click", async () => {
      await supabaseClient
        .from("shopping_items")
        .delete()
        .eq("checked", true);
      await loadItems();
    });

    loadItems();
  </script>
</body>
</html>
